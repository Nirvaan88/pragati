<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5, shrink-to-fit=no" />
  <title>{% block title %}My App{% endblock %}</title>
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.ico.png') }}">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Flatpickr CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">

  <!-- Custom Styles -->
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

  {% block head %}{% endblock %}
</head>
<body class="d-flex flex-column min-vh-100 bg-white">

  <!-- Flash messages (bottom right) -->
  <div id="flash-container" class="position-fixed bottom-0 end-0 p-3 z-3">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ 'danger' if category == 'error' else category }} alert-dismissible fade show shadow flash-msg mb-2" role="alert" style="min-width: 250px;">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}
  </div>

  <!-- Main Content -->
    <main class="flex-grow-1 p-0">
      {% block content %}{% endblock %}
  </main>

  <!-- Footer -->
  <footer class="bg-light text-center py-3 mt-auto w-100">
    <small class="text-muted">© HKJPL</small>
   <!--<small class="text-muted">© {{ current_year or '2025' }} My Company</small>--> 
  </footer>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

  <script>
    // Auto-dismiss alerts after 3 seconds
    setTimeout(() => {
      document.querySelectorAll('.flash-msg').forEach(alert => {
        const bsAlert = bootstrap.Alert.getOrCreateInstance(alert);
        bsAlert.close();
      });
    }, 3000);
  </script>

  {% block scripts %}{% endblock %}
</body>
</html>
